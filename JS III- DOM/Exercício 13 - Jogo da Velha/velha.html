            <label for="jogador1">Jogador 2</label>

        </div>
        <div>
            <p id="turno"></p>
        </div>
        <div id="tabuleiro">

            <p id="2"></p>
            <p id="3"></p>
            <p id="4"></p>
            <p id="5"></p>
            <p id="6"></p>

            <p id="9"></p>

    </main>

</html>
